<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Fitox Fitness Club</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #080808;
      color: #F0F0F0;
      font-family: 'DM Sans', sans-serif;
      text-align: center;
      padding: 24px;
    }
    .error-code {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(80px, 20vw, 180px);
      font-weight: 800;
      letter-spacing: -2px;
      color: #D00000;
      line-height: 1;
    }
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 700;
      text-transform: uppercase;
      margin: 16px 0 12px;
    }
    p {
      color: #888;
      font-size: 15px;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    a {
      display: inline-block;
      padding: 14px 36px;
      background: #D00000;
      color: #F0F0F0;
      text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-radius: 4px;
      transition: background .2s;
    }
    a:hover { background: #E8302A; }
  </style>
</head>
<body>
  <div class="error-code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Head back to the homepage to find what you need.</p>
  <a href="/">Back to Home</a>
</body>
</html>
